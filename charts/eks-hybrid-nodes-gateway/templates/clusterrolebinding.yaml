apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "eks-hybrid-nodes-gateway.fullname" . }}
  labels:
    {{- include "eks-hybrid-nodes-gateway.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "eks-hybrid-nodes-gateway.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "eks-hybrid-nodes-gateway.serviceAccountName" . }}
    namespace: {{ include "eks-hybrid-nodes-gateway.namespace" . }}
